# fly.toml app configuration file generated for slova on 2026-07-08T14:29:51Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'slova'
primary_region = 'ams'

[build]

[env]
  DATABASE_URL = '/app/data/app.db'

[[mounts]]
  source = 'data'
  destination = '/app/data'

[http_service]
  # Nitro listens on 3000 (see Dockerfile EXPOSE and the e2e config).
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
