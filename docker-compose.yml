services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./app.db}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8000}
    depends_on:
      - backend

volumes:
  backend_venv:
  frontend_node_modules:
