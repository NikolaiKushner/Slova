services:
  # Production-like run: same image Fly.io deploys, DB persisted in ./data.
  prod:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: /app/data/app.db
      # Local prod-parity only — never set this on Fly (see TEST_USERS.md).
      SLOVA_SEED_USERS: "1"
    volumes:
      - ./data:/app/data

  # Dev server with hot reload; source is bind-mounted, node_modules stays
  # in the image so the Linux better-sqlite3 build doesn't clash with macOS.
  dev:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: /app/data/app.db
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.nuxt
      - ./data:/app/data
